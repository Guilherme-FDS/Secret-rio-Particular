services:
  # ── WhatsApp Gateway ──────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: secretario-evolution
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_TTL: "604800"
      LOG_LEVEL: ERROR
      LOG_COLOR: "true"
      DEL_INSTANCE: "false"
    depends_on:
      - redis
    networks:
      - secretario-net

  # ── Orquestrador de Fluxos ────────────────────────────────────────────
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    container_name: secretario-n8n
    restart: unless-stopped
    ports:
      - "8080:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:8080
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-haiku}
      GROQ_API_KEY: ${GROQ_API_KEY}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      GMAIL_ADDRESS: ${GMAIL_ADDRESS}
      MEU_NUMERO: ${MEU_NUMERO}
      # SSH: usa host.docker.internal para acesso ao PC local
      # ou IP Tailscale para acesso remoto
      SSH_HOST: ${SSH_HOST:-host-gateway}
      SSH_USER: ${SSH_USER}
    extra_hosts:
      - "host-gateway:host-gateway"  # resolve host.docker.internal no Linux
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows
      - ./scripts:/home/node/scripts
      - ./n8n/ssh:/home/node/.ssh:ro
    depends_on:
      - redis
    networks:
      - secretario-net

  # ── Acesso Tailscale (n8n → rede Tailscale) ───────────────────────────
  # Permite ao n8n alcançar máquinas remotas via Tailscale (modo userspace)
  # Só ativo se TAILSCALE_AUTHKEY estiver preenchido no .env
  tailscale:
    image: tailscale/tailscale:latest
    container_name: secretario-tailscale
    hostname: secretario-agent
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY:-}
      TS_USERSPACE: "true"
      TS_STATE_DIR: /var/lib/tailscale
      TS_HOSTNAME: secretario-n8n
      TS_EXTRA_ARGS: "--accept-routes"
    volumes:
      - tailscale-state:/var/lib/tailscale
    networks:
      - secretario-net
    profiles:
      - tailscale  # ativa com: docker compose --profile tailscale up -d

  # ── Memória das Conversas ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: secretario-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - secretario-net

volumes:
  redis-data:
  tailscale-state:

networks:
  secretario-net:
    driver: bridge
